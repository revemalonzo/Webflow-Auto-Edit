name: Webflow Text Updater

on:
  # Manual trigger only -- enable schedule when ready for autonomous runs
  workflow_dispatch:
    inputs:
      batch_url:
        description: 'Linear batch URL (leave blank for normal polling run)'
        required: false
        type: string
      dry_run:
        description: 'Dry run -- read only, no writes'
        required: false
        type: boolean
        default: false

jobs:
  update:
    name: Run text updater
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run updater
        env:
          WEBFLOW_API_TOKEN_1: ${{ secrets.WEBFLOW_API_TOKEN_1 }}
          WEBFLOW_API_TOKEN_2: ${{ secrets.WEBFLOW_API_TOKEN_2 }}
          WEBFLOW_API_TOKEN_3: ${{ secrets.WEBFLOW_API_TOKEN_3 }}
          WEBFLOW_API_TOKEN_4: ${{ secrets.WEBFLOW_API_TOKEN_4 }}
          BUGHERD_API_KEY: ${{ secrets.BUGHERD_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          BATCH_URL: ${{ inputs.batch_url }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

        run: node src/index.js
